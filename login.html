<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your Tara Pangasinan account to manage your bookings and saved destinations.">
    <meta property="og:title" content="Log In | Tara Pangasinan">
    <meta property="og:description" content="Log in to your Tara Pangasinan account to manage your bookings and saved destinations.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global/variables.css">
    <link rel="stylesheet" href="css/global/base.css">
    <link rel="stylesheet" href="css/pages/login/main.css">
    <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg">
    <title>Log In | Tara Pangasinan</title>
</head>
<body>
    <div class="auth-split-layout">
        
        <!-- Left Side: Image -->
        <div class="auth-image-side">
            <div class="auth-image-text">
                <h2>Discover Paradise</h2>
                <p>Log in to seamlessly manage your bookings, curate your perfect itinerary, and access your saved destinations across Pangasinan.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="auth-form-side">
            <a href="home.html" class="auth-logo">
                <img src="assets/icons/logo.svg" alt="Logo" width="32" height="32">
                <div class="auth-logo-text">
                    <span class="green">Tara</span>
                    <span class="dark">Pangasinan</span>
                </div>
            </a>

            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to access your account.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div class="auth-options">
                    <label>
                        <input type="checkbox" style="accent-color: var(--brand-green);"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <div id="loginError" style="display:none;color:#dc2626;font-size:14px;margin-bottom:12px;padding:10px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;"></div>

                <button type="submit" class="btn-auth" id="loginSubmit">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up for free</a>
            </div>
        </div>

    </div>
<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();

    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errEl    = document.getElementById('loginError');
    var btn      = document.getElementById('loginSubmit');

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Logging in\u2026';

    Api.post('auth/login.php', { email: email, password: password })
        .then(function (data) {
            // Mirror to localStorage so existing UI code keeps working
            localStorage.setItem('tara_session', '1');
            localStorage.setItem('tara_user', JSON.stringify(data.user));

            // Merge any guest-saved spots into the server
            var guestSaves = JSON.parse(localStorage.getItem('tara_saved') || '[]');
            var merges = guestSaves.map(function (id) {
                return Api.post('saved/toggle.php', { spot_id: id, force: 'save' })
                           .catch(function () { /* ignore per-item errors */ });
            });
            Promise.all(merges).then(function () {
                window.location.href = 'home.html';
            });
        })
        .catch(function (err) {
            errEl.textContent = err.message;
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Log In';
        });
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var bgImages = [
        'assets/images/nature/hundred-island-national-park.jpg',
        'assets/images/nature/hundred-island-2.webp',
        'assets/images/beaches/bolinao-patar-beach-1.jpg',
        'assets/images/beaches/tondol-whitesand.jpg',
        'assets/images/nature/enchanted-cave.jpg',
        'assets/images/beaches/tambobong-beach.jpg'
    ];
    var randomImg = bgImages[Math.floor(Math.random() * bgImages.length)];
    var side = document.querySelector('.auth-image-side');
    if (side) {
        side.style.backgroundImage = 'url(' + randomImg + ')';
    }
});
</script>
</body>
</html>
