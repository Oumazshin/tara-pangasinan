<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your Tara Pangasinan account to manage your bookings and saved destinations.">
    <meta property="og:title" content="Log In | Tara Pangasinan">
    <meta property="og:description" content="Log in to your Tara Pangasinan account to manage your bookings and saved destinations.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global/variables.css">
    <link rel="stylesheet" href="css/global/base.css">
    <link rel="stylesheet" href="css/pages/login/main.css">
    <link rel="icon" type="image/svg+xml" href="assets/Home Page/Logo.svg">
    <title>Log In | Tara Pangasinan</title>
</head>
<body>
    <div class="auth-split-layout">
        
        <!-- Left Side: Image -->
        <div class="auth-image-side">
            <div class="auth-image-text">
                <h2>Discover Paradise</h2>
                <p>Log in to seamlessly manage your bookings, curate your perfect itinerary, and access your saved destinations across Pangasinan.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="auth-form-side">
            <a href="home.html" class="auth-logo">
                <img src="assets/Home Page/Logo.svg" alt="Logo" width="32" height="32">
                <div class="auth-logo-text">
                    <span class="green">Pangasinan</span>
                    <span class="dark">Tourism</span>
                </div>
            </a>

            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to access your account.</p>
            </div>

            <form action="profile.html" method="GET" id="loginForm" onsubmit="event.preventDefault(); window.location.href='profile.html';">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div class="auth-options">
                    <label>
                        <input type="checkbox" style="accent-color: var(--brand-green);"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-auth">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up for free</a>
            </div>
        </div>

    </div>
</body>
</html>
