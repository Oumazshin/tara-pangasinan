<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your saved Pangasinan destinations and easily plan your next trip.">
    <meta property="og:title" content="Saved Spots | Tara Pangasinan">
    <meta property="og:description" content="View your saved Pangasinan destinations and easily plan your next trip.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global/variables.css">
    <link rel="stylesheet" href="css/global/base.css">
    <link rel="stylesheet" href="css/global/navbar.css">
    <link rel="stylesheet" href="css/global/footer.css">
    <link rel="stylesheet" href="css/pages/saved/main.css">
    <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg">
    <title>Saved Spots | Tara Pangasinan</title>
</head>
<body>

    <!-- Navbar -->
    <header id="navbar-placeholder"></header>

    <!-- Hero -->
    <header class="saved-hero">
        <div class="saved-hero-content">
            <h1>Saved Destinations</h1>
            <p>Your personal collection of favorite spots across Pangasinan.</p>
        </div>
        <svg class="saved-hero-wave" viewBox="0 0 1440 64" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path d="M0,32 C240,64 480,0 720,32 C960,64 1200,0 1440,32 L1440,64 L0,64 Z" fill="#f8fafc"/>
        </svg>
    </header>

    <!-- Content -->
    <section class="saved-content">
        <div class="container">
            <div class="saved-header">
                <h2>Your List</h2>
                <span class="saved-count" id="saved-count">0 Items Saved</span>
            </div>
            <div class="explore-grid" id="savedGrid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer-placeholder"></footer>
    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>

    <script>
    const CAT_COLORS_SAVED = {
        Nature: '#10b981', Beach: '#0ea5e9', Historical: '#78716c',
        Festival: '#f59e0b', Food: '#ef4444'
    };

    function getSaved() {
        return JSON.parse(localStorage.getItem('tara_saved') || '[]');
    }

    function removeSaved(id) {
        var s = getSaved().filter(function(x) { return x !== id; });
        localStorage.setItem('tara_saved', JSON.stringify(s));
        // Sync removal to server if logged in
        if (localStorage.getItem('tara_session') && typeof Api !== 'undefined') {
            Api.post('saved/toggle.php', { spot_id: id, force: 'remove' })
               .catch(function () { /* silent */ });
        }
        renderSaved(window._spotsCache || []);
    }

    function renderSaved(spots) {
        const savedIds = getSaved();
        const grid  = document.getElementById('savedGrid');
        const count = document.getElementById('saved-count');
        const saved = spots.filter(s => savedIds.includes(s.id));

        count.textContent = saved.length + (saved.length === 1 ? ' Item Saved' : ' Items Saved');

        if (!saved.length) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:80px 20px;">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" style="display:block;margin:0 auto 16px;"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    <h3 style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#374151;margin-bottom:8px;">No saved spots yet</h3>
                    <p style="font-family:'Inter',sans-serif;font-size:14px;color:#6b7280;margin-bottom:24px;">Start exploring and click "Save" on spots you love.</p>
                    <a href="explore.html" style="display:inline-flex;align-items:center;gap:8px;background:#1D9E75;color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;">
                        Explore Destinations
                    </a>
                </div>`;
            return;
        }

        grid.innerHTML = saved.map(s => `
            <div class="explore-card">
                <div class="explore-card-img" style="background-image:url('${s.image}');">
                    <span class="explore-card-badge" style="background:${CAT_COLORS_SAVED[s.category] || '#6b7280'}">${s.category}</span>
                    <button class="btn-remove-save" onclick="event.preventDefault();event.stopPropagation();removeSaved('${s.id}')" title="Remove from saved">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </button>
                </div>
                <div class="explore-card-body">
                    <div class="explore-card-title">${s.title}</div>
                    <div class="explore-card-loc">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${s.location}
                    </div>
                    <p class="explore-card-desc">${s.shortDesc || s.short_desc}</p>
                    <div class="explore-card-footer">
                        <div class="explore-card-rating">⭐ ${s.rating} (${s.reviews || s.reviews_count})</div>
                        <a href="details.html?id=${s.id}" class="explore-card-link">
                            View Details
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </a>
                    </div>
                </div>
            </div>`).join('');
    }

    // Hydrate saved IDs from server if logged in, then load spots
    function loadPage() {
        var hydrate = (localStorage.getItem('tara_session') && typeof Api !== 'undefined')
            ? Api.get('saved/list.php')
                 .then(function(data) { localStorage.setItem('tara_saved', JSON.stringify(data.saved_ids || [])); })
                 .catch(function() { /* use cached */ })
            : Promise.resolve();

        hydrate.then(function() {
            Api.get('spots/list.php')
                .then(function(spots) { window._spotsCache = spots; renderSaved(spots); })
                .catch(function() {
                    document.getElementById('savedGrid').innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#6b7280;font-family:Inter,sans-serif;">Failed to load spots. Please refresh.</div>';
                });
        });
    }
    loadPage();
    </script>
</body>
</html>
