<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Interactive map of Pangasinan. Easily locate tourist spots, beaches, and historical landmarks.">
    <meta property="og:title" content="Map | Tara Pangasinan">
    <meta property="og:description" content="Interactive map of Pangasinan. Easily locate tourist spots, beaches, and historical landmarks.">
    <meta property="og:image" content="assets/images/backgrounds/headerbg.jpg">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global/variables.css">
    <link rel="stylesheet" href="css/global/base.css">
    <link rel="stylesheet" href="css/global/navbar.css">
    <link rel="stylesheet" href="css/global/footer.css">
    <link rel="stylesheet" href="css/pages/map/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg">
    <title>Map | Tara Pangasinan</title>
</head>
<body>

    <!-- Navbar -->
    <header id="navbar-placeholder"></header>

    <!-- Hero -->
    <header class="map-hero">
        <div class="map-hero-content">
            <p class="map-hero-label">Navigate Pangasinan</p>
            <h1>Interactive Map</h1>
            <p>Discover the exact locations of Pangasinan's breathtaking destinations.</p>
        </div>
        <svg class="map-hero-wave" viewBox="0 0 1440 64" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path d="M0,32 C240,64 480,0 720,32 C960,64 1200,0 1440,32 L1440,64 L0,64 Z" fill="#f8fafc"/>
        </svg>
    </header>

    <!-- Map Layout -->
    <div class="map-container">
        
        <!-- Sidebar Locations -->
        <div class="map-sidebar">
            <h2>Locations</h2>
            <p>Click a destination to locate it on the map.</p>
            
            <div class="map-search-wrapper">
                <svg class="map-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="mapSearch" placeholder="Search destinations...">
            </div>

            <div class="map-filters-inline">
                <button class="map-filter-btn active" data-category="All">All</button>
                <button class="map-filter-btn" data-category="Nature">Nature</button>
                <button class="map-filter-btn" data-category="Beach">Beach</button>
                <button class="map-filter-btn" data-category="Historical">Hist.</button>
                <button class="map-filter-btn" data-category="Festival">Fest.</button>
                <button class="map-filter-btn" data-category="Food">Food</button>
            </div>

            <div id="sidebar-cards-container">
                <!-- Dynamically populated -->
                <div class="loading-map" style="padding:20px; text-align:center; color:#6b7280;">Loading destinations...</div>
            </div>
        </div>

        <!-- Leaflet Map Container -->
        <div class="map-view-wrapper">
            <div id="leafletMap"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer-placeholder"></footer>

    <!-- Leaflet JS & Logic -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Initialize Map
        const map = L.map('leafletMap', {
            zoomControl: false // Add custom zoom later if needed
        }).setView([16.0, 120.3], 9);

        // Add Base Tile Layer (CartoDB Positron for clean look)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        }).addTo(map);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const createMarkerIcon = (color, category) => {
            const iconFile = category + '.svg';
            return L.divIcon({
                className: 'custom-leaflet-marker',
                html: `<div style="position: relative; width: 38px; height: 38px;">
                          <svg width="38" height="38" viewBox="0 0 24 24" fill="${color}" stroke="#fff" stroke-width="1.5" style="filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3))">
                              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                          </svg>
                          <img src="assets/icons/${iconFile}" style="position: absolute; top: 7px; left: 11px; width: 16px; height: 16px; filter: brightness(0) invert(1); object-fit: contain;" alt="${category}">
                       </div>`,
                iconSize: [38, 38],
                iconAnchor: [19, 38],
                popupAnchor: [0, -34]
            });
        };

        const categoryColors = {
            'Nature': '#1D9E75',
            'Beach': '#0EA5E9',
            'Historical': '#EAB308',
            'Festival': '#EF4444',
            'Food': '#F97316'
        };

        let allSpots = [];
        let markers = [];
        let activeCategory = 'All';
        let searchQuery = '';

        // Fetch Spots from database API
        Api.get('spots/list.php')
            .then(function(data) {
                allSpots = data;
                renderMapAndSidebar();
            })
            .catch(function(error) {
                console.error('Error loading spots:', error);
                document.getElementById('sidebar-cards-container').innerHTML = '<div style="padding:20px; text-align:center; color:red;">Failed to load destinations.</div>';
            });

        function renderMapAndSidebar() {
            const container = document.getElementById('sidebar-cards-container');
            container.innerHTML = '';
            
            // Clear existing markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            let filteredSpots = allSpots;
            
            if (activeCategory !== 'All') {
                filteredSpots = filteredSpots.filter(s => s.category === activeCategory);
            }

            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase();
                filteredSpots = filteredSpots.filter(s => 
                    s.title.toLowerCase().includes(q) || 
                    s.location.toLowerCase().includes(q) ||
                    s.category.toLowerCase().includes(q)
                );
            }

            if (filteredSpots.length === 0) {
                container.innerHTML = `
                    <div style="padding:40px 20px; text-align:center; color:#6b7280; display:flex; flex-direction:column; align-items:center; gap:12px;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        No destinations found.
                    </div>`;
                return;
            }

            const bounds = L.latLngBounds();

            filteredSpots.forEach((spot, index) => {
                const color = categoryColors[spot.category] || '#1D9E75';
                
                // Add marker
                const marker = L.marker([spot.lat, spot.lng], { icon: createMarkerIcon(color, spot.category) })
                    .bindPopup(`
                        <div class="popup-card">
                            <img src="${spot.image}" alt="${spot.title}" class="popup-img">
                            <div class="popup-body">
                                <h3 class="popup-title">${spot.title}</h3>
                                <div class="popup-loc">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                    ${spot.location}
                                </div>
                                <a href="details.html?id=${spot.id || spot.title.toLowerCase().replace(/\\s+/g, '-')}" class="popup-btn">Explore Details</a>
                                <a href="https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lng}" target="_blank" class="popup-directions">Get Directions</a>
                            </div>
                        </div>
                    `, { closeButton: true, autoPanPadding: [20, 50] })
                    .addTo(map);
                markers.push(marker);
                bounds.extend([spot.lat, spot.lng]);

                // Create sidebar card
                const card = document.createElement('div');
                card.className = `map-card ${index === 0 ? 'active' : ''}`;
                card.onclick = (e) => {
                    panTo(spot.lat, spot.lng, marker);
                    document.querySelectorAll('.map-card').forEach(c => c.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                };

                const ratingHtml = spot.rating ? `
                    <div class="map-card-rating">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="#EAB308" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <span>${spot.rating} (${spot.reviews || 0})</span>
                    </div>` : '';

                card.innerHTML = `
                    <img src="${spot.image}" alt="${spot.title}" class="map-card-img">
                    <div class="map-card-info">
                        <span class="map-card-title">${spot.title}</span>
                        <span class="map-card-loc">${spot.location}</span>
                        ${ratingHtml}
                        <span class="map-card-badge" style="color: ${color}; background: ${color}20;">${spot.category}</span>
                    </div>
                `;
                container.appendChild(card);
            });

            // Adjust map bounds
            if (filteredSpots.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
                setTimeout(() => markers[0].openPopup(), 500);
            }
        }

        function panTo(lat, lng, marker) {
            map.flyTo([lat, lng], 14, { duration: 1.5 });
            if (marker) {
                setTimeout(() => marker.openPopup(), 1000);
            }
        }

        // Filter Logic
        document.querySelectorAll('.map-filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.map-filter-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                activeCategory = e.currentTarget.getAttribute('data-category');
                renderMapAndSidebar();
            });
        });

        // Search Logic
        document.getElementById('mapSearch').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderMapAndSidebar();
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
